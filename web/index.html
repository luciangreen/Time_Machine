<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Time Machine — Tau Prolog client-side web app. Run Prolog queries in the browser on iPhone, Android or desktop.">
  <title>Time Machine — Tau Prolog</title>
  <link rel="stylesheet" href="style.css">
  <!-- Tau Prolog core engine (no server required) -->
  <script src="https://cdn.jsdelivr.net/npm/tau-prolog@0.3.2/modules/core.js"></script>
</head>
<body>
  <header>
    <h1>⏳ Time Machine — Tau Prolog</h1>
    <p class="subtitle">Client-side Prolog running entirely in your browser</p>
  </header>

  <div id="status" class="status loading">Loading…</div>
	
  <main>
    <!-- Quick-action buttons -->
    <div class="quick-actions">
      <button data-query="run.">run.</button>
    </div>

    <!-- Query input -->
    <div class="query-row">
      <textarea
        id="queryInput"
        rows="1"
        placeholder="Enter a Prolog query… (e.g. run.)"
        disabled
      ></textarea>
      <button id="runBtn" class="run-btn" disabled>Run</button>
      <button id="clearBtn" class="clear-btn">Clear</button>
    </div>

    <!-- Output -->
    <div id="output" role="log" aria-live="polite" aria-label="Query output"></div>
  </main>

  <footer>
    Powered by <a href="https://tau-prolog.org" target="_blank" rel="noopener">Tau Prolog</a> &middot;
    <a href="https://github.com/luciangreen/Time_Machine" target="_blank" rel="noopener">Source on GitHub</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
